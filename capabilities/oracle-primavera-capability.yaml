    baseUri: https://primavera.example.com/p6ws/rest/v1
    description: Oracle Primavera P6 EPPM REST API HTTP API.
    authentication:
      type: basic
      username: '{{ORACLE_PRIMAVERA_USERNAME}}'
      password: '{{ORACLE_PRIMAVERA_PASSWORD}}'
