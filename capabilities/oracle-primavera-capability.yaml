          description: Comma-separated list of fields to return
        - name: Filter
          in: query
          type: string
          description: RSQL filter expression
        - name: OrderBy
          in: query
          type: string
          description: Field to sort by
        - name: offset
          in: query
          type: integer
          description: Pagination offset
        - name: limit
          in: query
          type: integer
          description: Maximum records to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproject
        method: POST
        description: Create a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
