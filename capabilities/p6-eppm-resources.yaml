naftiko: 1.0.0-alpha2
info:
  label: Oracle Primavera P6 EPPM REST API — Resources
  description: 'Oracle Primavera P6 EPPM REST API — Resources. 1 operations. Lead operation: List resources. Self-contained
    Naftiko capability covering one Oracle Primavera business surface.'
  tags:
  - Oracle Primavera
  - Resources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_PRIMAVERA_API_KEY: ORACLE_PRIMAVERA_API_KEY
capability:
  consumes:
  - type: http
    namespace: p6-eppm-resources
    baseUri: https://{host}/p6ws/rest/v1
    description: Oracle Primavera P6 EPPM REST API — Resources business capability. Self-contained, no shared references.
    resources:
    - name: resources
      path: /resources
      operations:
      - name: listresources
        method: GET
        description: List resources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Fields
          in: query
          type: string
        - name: Filter
          in: query
          type: string
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.ORACLE_PRIMAVERA_API_KEY}}'
  exposes:
  - type: rest
    namespace: p6-eppm-resources-rest
    port: 8080
    description: REST adapter for Oracle Primavera P6 EPPM REST API — Resources. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/resources
      name: resources
      description: REST surface for resources.
      operations:
      - method: GET
        name: listresources
        description: List resources
        call: p6-eppm-resources.listresources
        with:
          Fields: rest.Fields
          Filter: rest.Filter
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: p6-eppm-resources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Primavera P6 EPPM REST API — Resources. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-resources
      description: List resources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: p6-eppm-resources.listresources
      with:
        Fields: tools.Fields
        Filter: tools.Filter
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
