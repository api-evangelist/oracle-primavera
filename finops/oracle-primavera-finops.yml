specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Oracle Primavera
providerId: oracle-primavera
publisherName: Oracle America, Inc.
serviceCategory: Project Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Project Management
  - Construction
  - Engineering
  - Oracle Cloud
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps view for Oracle Primavera: Primavera Cloud is billed as
  a SaaS subscription per Hosted Named User per month (with role tiers for
  full-use vs viewer); on-premises P6 EPPM is billed against the contractual
  Oracle Technology license. REST API access is bundled with the subscription
  / license. FinOps observation focuses on user-license utilization per role
  and on the underlying infrastructure costs for on-premises deployments.
sources:
  - https://www.oracle.com/construction-engineering/primavera/
  - https://docs.oracle.com/cd/F37125_01/
  - https://www.oracle.com/cloud/price-list/
notes: >-
  No per-API meter exists. Track license seat utilization per role through
  the Primavera Cloud admin console, plus underlying OCI / on-premises
  infrastructure cost for on-premises P6 EPPM deployments.
billingModel:
  pricingCategory: Tiered Subscription + BYOL (On-Premises)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Oracle Primavera
  ServiceCategory: Project Management
  ProviderName: Oracle
  PublisherName: Oracle America, Inc.
  InvoiceIssuerName: Oracle America, Inc.
  BillingCurrency: USD
  PricingCategory: Subscription
  ChargeCategory: Purchase
meters:
  - name: primavera_cloud_full_user_subscription
    description: Active Hosted Named User (full-use) seats per month
    unit: seat-month
    aggregation: max
    dimensions:
      - role
      - business_unit
  - name: primavera_cloud_viewer_subscription
    description: Active Hosted Named User (viewer) seats per month
    unit: seat-month
    aggregation: max
    dimensions:
      - role
      - business_unit
  - name: primavera_p6_on_prem_license
    description: Contractual Oracle Technology license for on-premises P6 EPPM
    unit: license
    aggregation: max
    dimensions:
      - license_type
  - name: rest_api_calls
    description: REST API calls (informational; bundled in the subscription / license)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - consumer
principles:
  - name: Visibility
    description: >-
      Review per-role seat utilization in the Primavera Cloud admin console
      and reconcile monthly against the contractual seat count; for
      on-premises P6 EPPM track the underlying WebLogic / database
      infrastructure cost separately.
  - name: Allocation
    description: >-
      Tag user records with project, business unit, and cost center so
      Primavera seats can be attributed back to the consuming portfolio.
  - name: Optimization
    description: >-
      Move occasional reviewers from full-use to viewer seats, reclaim
      inactive accounts, and consolidate small project portfolios onto a
      single Primavera Cloud tenant where governance permits.
  - name: Accountability
    description: >-
      Pair the Primavera applications administrator with a portfolio /
      construction-controls owner; review seat growth and renewal scoping at
      portfolio gate reviews.
apis:
